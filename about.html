<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>神風ロック祭り - バンド紹介</title>

<style>
body {
    background-color: #87CEFA;
    font-family: "MS PGothic", "Hiragino Kaku Gothic ProN", sans-serif;
    text-align: center;
    color: #000;
}

/* 全体枠 */
.container {
    width: 90%;
    max-width: 900px;
    margin: 20px auto;
    border: 5px double red;
    background-color: #fff8dc;
    padding: 10px;
}

/* バナー */
.banner {
    font-size: 28px;
    font-weight: bold;
    color: white;
    background: linear-gradient(to right, red, orange, yellow);
    padding: 10px;
    border: 3px solid black;
    margin-bottom: 15px;
}

/* 画像 */
.photo {
    margin: 10px 0;
    border: 5px ridge silver;
}

/* 説明枠 */
.description {
    border: 3px dashed blue;
    padding: 15px;
    background-color: #f0f8ff;
    font-size: 16px;
    line-height: 1.6;
    text-align: left;
}

/* 90sっぽい区切り */
hr {
    border: none;
    border-top: 3px dotted black;
    margin: 20px 0;
}

/* 点滅（雑にレトロ感） */
.blink {
    animation: blink 0.6s steps(2, start) infinite;
}

@keyframes blink {
    to { visibility: hidden; }
}
</style>
</head>

<body>

<div class="container">

    <!-- バナー -->
    <div class="banner">
        神風ロック祭りとは
    </div>

    <!-- 集合写真 -->
    <div class="photo">
        <img src="images/all2.jpg" width="100%" alt="集合写真">
    </div>

    <hr>

    <!-- 説明枠 -->
    <div class="description">

        <!-- ここに本文が入る -->
        <p>
            ※ここにバンド紹介文が入ります<br>
            （あとで差し替え前提）
        </p>

        <br>

        <!-- 箇条書き用の仮枠 -->
        <ul>
            <li>※メンバー紹介（未定）</li>
            <li>※活動内容（未定）</li>
            <li>※結成背景（未定）</li>
        </ul>

    </div>

    <hr>

    <!-- フッター -->
    <div style="font-size:12px;">
        © 神風ロック祭り
    </div>

</div>

</body>
</html>
