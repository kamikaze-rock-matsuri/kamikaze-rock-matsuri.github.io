<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>神風ロック祭り - バンド紹介</title>

<style>
body {
    background-color: #87CEFA;
    font-family: "MS PGothic", "Hiragino Kaku Gothic ProN", sans-serif;
    text-align: center;
    color: #000;
}

/* 全体枠 */
.container {
    width: 90%;
    max-width: 900px;
    margin: 20px auto;
    border: 5px double red;
    background-color: #fff8dc;
    padding: 10px;
}

/* バナー */
.banner {
    font-size: 28px;
    font-weight: bold;
    color: white;
    background: linear-gradient(to right, red, orange, yellow);
    padding: 10px;
    border: 3px solid black;
    margin-bottom: 15px;
}

/* 画像 */
.photo {
    margin: 10px 0;
    border: 5px ridge silver;
}

/* 説明枠 */
.description {
    border: 3px dashed blue;
    padding: 15px;
    background-color: #f0f8ff;
    font-size: 16px;
    line-height: 1.6;
    text-align: left;
}

/* 90sっぽい区切り */
hr {
    border: none;
    border-top: 3px dotted black;
    margin: 20px 0;
}

/* 点滅（雑にレトロ感） */
.blink {
    animation: blink 0.6s steps(2, start) infinite;
}

.photo img {
    width: auto;
    max-width: 100%;
    height: auto;

    display: block;
    margin: 0 auto;

    border: 3px solid #000;
    background: #fff;
}

@keyframes blink {
    to { visibility: hidden; }
}
</style>
</head>

<body>

<div class="container">

    <!-- バナー -->
    <div class="banner">
        神風ロック祭りとは
    </div>

    <!-- 集合写真 -->
    <div class="photo">
        <img src="images/all2.jpg" alt="集合写真">
    </div>

    <hr>

    <!-- 説明枠 -->
    <div class="description">

        <!-- ここに本文が入る -->
        ポマードとガソリンの香りのする、地元密着型昭和式ロックンロールバンド！！！<br>
        懐かしのロックンロールで会場はダンスホール！！！<br>
        気合い入れていくんでヨロシク！！！<br>
        <br>
        なんちて（核爆）<br>
        静岡県内どこでも駆けつけます、詳しくは<a href="irai.html">出演依頼のページ</a>にて！！
        

    </div>

    <hr>

    <!-- フッター -->
    <div style="font-size:12px;">
        © 2026 神風ロック祭り<br>
        All Rock'n Roll Reserved.
    </div>

</div>

</body>
</html>
